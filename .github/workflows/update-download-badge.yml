name: Update Download Badge

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Get download count
        id: get
        run: |
          count=$(curl -s "https://api.github.com/repos/Miners-World-Coin-MWC/MinersWorldCoin-Android-Miner/releases/tags/1.9.0" \
            | jq '.assets[] | select(.name=="androidMinerMWC.apk") | .download_count')
          echo "DOWNLOADS=$count" >> $GITHUB_OUTPUT

      - name: Create custom SVG badge with image
        run: |
          LABEL="APK"
          VALUE="${{ steps.get.outputs.DOWNLOADS }}"
          COLOR="rgba(0,0,0,0.6)"  # semi-transparent overlay for text readability

          # Encode your image to base64 for embedding
          IMG_BASE64=$(base64 -w 0 image_2026-03-02_180732523.png)

          # Generate the SVG
          echo "<svg xmlns='http://www.w3.org/2000/svg' width='400' height='80'>
            <image href='data:image/png;base64,$IMG_BASE64' width='400' height='80'/>
            <rect x='0' y='50' width='400' height='30' fill='$COLOR'/>
            <text x='200' y='70' font-family='Verdana,Geneva,DejaVu Sans,sans-serif' font-size='16' fill='#fff' text-anchor='middle'>
              $LABEL Downloads: $VALUE
            </text>
          </svg>" > downloads.svg

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads.svg
          git commit -m "Update download badge" || echo "No changes"
          git push
