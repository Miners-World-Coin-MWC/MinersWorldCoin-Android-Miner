name: Update Download Badge

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Get download count
        id: get
        run: |
          count=$(curl -s "https://api.github.com/repos/Miners-World-Coin-MWC/MinersWorldCoin-Android-Miner/releases/tags/1.9.4" \
            | jq '.assets[] | select(.name=="androidMinerMWC.apk") | .download_count')
          echo "DOWNLOADS=$count" >> $GITHUB_OUTPUT

      - name: Create Shields-style badge
        run: |
          LABEL="APK"
          VALUE="${{ steps.get.outputs.DOWNLOADS }}"
          COLOR="blue"

          # Simple SVG for Shields-style badge
          WIDTH_LABEL=$(( 6 * ${#LABEL} + 10 ))
          WIDTH_VALUE=$(( 6 * ${#VALUE} + 10 ))
          WIDTH_TOTAL=$((WIDTH_LABEL + WIDTH_VALUE))

          cat <<EOF > 194.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="$WIDTH_TOTAL" height="20">
            <linearGradient id="smooth" x2="0" y2="100%">
              <stop offset="0" stop-color="#fff" stop-opacity=".7"/>
              <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>
              <stop offset=".9" stop-color="#000" stop-opacity=".3"/>
              <stop offset="1" stop-color="#000" stop-opacity=".5"/>
            </linearGradient>
            <rect rx="3" width="$WIDTH_LABEL" height="20" fill="#555"/>
            <rect rx="3" x="$WIDTH_LABEL" width="$WIDTH_VALUE" height="20" fill="$COLOR"/>
            <rect rx="3" width="$WIDTH_TOTAL" height="20" fill="url(#smooth)"/>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="$((WIDTH_LABEL/2))" y="14">$LABEL</text>
              <text x="$((WIDTH_LABEL + WIDTH_VALUE/2))" y="14">$VALUE</text>
            </g>
          </svg>
          EOF

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 194.svg
          git commit -m "Update download badge" || echo "No changes"
          git push
